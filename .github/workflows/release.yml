name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Build, Test & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore CodeCompress.slnx

      - name: Build
        run: dotnet build CodeCompress.slnx --no-restore -c Release

      - name: Test
        run: dotnet test --solution CodeCompress.slnx --no-build -c Release

      - name: Determine version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Patch server.json version
        run: sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/g" src/CodeCompress.Server/.mcp/server.json

      - name: Pack Server
        run: dotnet pack src/CodeCompress.Server/CodeCompress.Server.csproj -c Release -o ./nupkg /p:Version=$VERSION

      - name: Pack CLI
        run: dotnet pack src/CodeCompress.Cli/CodeCompress.Cli.csproj -c Release -o ./nupkg /p:Version=$VERSION

      - name: Verify packages
        run: |
          echo "Packed NuGet packages:"
          ls -la ./nupkg/*.nupkg
          echo "Verifying Server package contains .mcp/server.json:"
          unzip -l ./nupkg/CodeCompress.Server.$VERSION.nupkg | grep ".mcp/server.json"

      - name: Publish to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create ${{ github.ref_name }} ./nupkg/*.nupkg --generate-notes
